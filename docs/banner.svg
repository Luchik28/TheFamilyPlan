<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6fb"/>
      <stop offset="1" stop-color="#e8edfb"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1c2333" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Left: title + tagline -->
  <g transform="translate(64, 96)">
    <g transform="translate(0,0)">
      <rect x="0" y="2" width="34" height="34" rx="9" fill="#4f7cff"/>
      <path d="M9 19 l6 6 l11 -13" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="28" font-size="27" font-weight="800" fill="#1c2333">The Family Plan</text>
    </g>

    <text x="0" y="92" font-size="40" font-weight="800" fill="#1c2333">Stop solving the</text>
    <text x="0" y="140" font-size="40" font-weight="800" fill="#4f7cff">carpool puzzle.</text>

    <text x="0" y="190" font-size="18" fill="#46506a">Say who's free to drive and where the kids</text>
    <text x="0" y="216" font-size="18" fill="#46506a">need to be. It figures out who drives whom —</text>
    <text x="0" y="242" font-size="18" fill="#46506a">pooling rides to save everyone time.</text>

    <!-- mini legend -->
    <g transform="translate(0, 286)" font-size="14" fill="#46506a">
      <rect x="0" y="-11" width="26" height="15" rx="4" fill="#4f7cff" fill-opacity="0.18" stroke="#4f7cff"/>
      <text x="36" y="1">driver available</text>
      <circle cx="183" cy="-4" r="5" fill="#e5484d"/>
      <text x="196" y="1">kid needs a ride</text>
    </g>
  </g>

  <!-- Right: stylized week grid -->
  <g transform="translate(648, 64)" filter="url(#card)">
    <rect width="488" height="352" rx="16" fill="#ffffff"/>

    <!-- day headers -->
    <g font-size="12" font-weight="700" fill="#6b7280" text-anchor="middle">
      <text x="92" y="34">MON</text>
      <text x="178" y="34">TUE</text>
      <text x="264" y="34">WED</text>
      <text x="350" y="34">THU</text>
      <text x="436" y="34">FRI</text>
    </g>
    <line x1="16" y1="48" x2="472" y2="48" stroke="#e3e7ef"/>

    <!-- hour gridlines -->
    <g stroke="#eef1f7">
      <line x1="50" y1="92" x2="472" y2="92"/>
      <line x1="50" y1="140" x2="472" y2="140"/>
      <line x1="50" y1="188" x2="472" y2="188"/>
      <line x1="50" y1="236" x2="472" y2="236"/>
      <line x1="50" y1="284" x2="472" y2="284"/>
      <line x1="50" y1="332" x2="472" y2="332"/>
    </g>
    <!-- time gutter -->
    <g font-size="10" fill="#9aa3b2" text-anchor="end">
      <text x="42" y="96">8 AM</text>
      <text x="42" y="192">12 PM</text>
      <text x="42" y="288">4 PM</text>
    </g>

    <!-- vertical day separators -->
    <g stroke="#eef1f7">
      <line x1="135" y1="48" x2="135" y2="336"/>
      <line x1="221" y1="48" x2="221" y2="336"/>
      <line x1="307" y1="48" x2="307" y2="336"/>
      <line x1="393" y1="48" x2="393" y2="336"/>
    </g>

    <!-- availability blocks (translucent, driver colors) -->
    <rect x="56" y="70" width="72" height="120" rx="6" fill="#4f7cff" fill-opacity="0.16" stroke="#4f7cff" stroke-width="1"/>
    <rect x="56" y="70" width="4" height="120" rx="2" fill="#4f7cff"/>

    <rect x="228" y="150" width="72" height="150" rx="6" fill="#22a06b" fill-opacity="0.16" stroke="#22a06b" stroke-width="1"/>
    <rect x="228" y="150" width="4" height="150" rx="2" fill="#22a06b"/>

    <rect x="400" y="96" width="64" height="170" rx="6" fill="#f97316" fill-opacity="0.16" stroke="#f97316" stroke-width="1"/>
    <rect x="400" y="96" width="4" height="170" rx="2" fill="#f97316"/>

    <!-- kid need markers (dot + pill) -->
    <g>
      <circle cx="150" cy="120" r="5" fill="#e5484d"/>
      <rect x="160" y="110" width="58" height="20" rx="10" fill="#fff" stroke="#e5484d"/>
      <text x="168" y="124" font-size="10" font-weight="700" fill="#1c2333">Soccer</text>
    </g>
    <g>
      <circle cx="322" cy="214" r="5" fill="#a855f7"/>
      <rect x="332" y="204" width="54" height="20" rx="10" fill="#fff" stroke="#a855f7"/>
      <text x="340" y="218" font-size="10" font-weight="700" fill="#1c2333">Piano</text>
    </g>
  </g>
</svg>
